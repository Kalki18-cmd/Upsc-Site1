<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>UPSC News Feed</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <style>
    body { font-family: Arial, sans-serif; margin: 20px; background: #f9f9f9; color: #333; }
    h1 { text-align: center; color: #2c3e50; }
    #date { text-align: center; font-style: italic; margin-bottom: 20px; }
    .news-item { background:#fff; padding:15px; margin:10px 0; border-radius:8px; box-shadow:0 2px 5px rgba(0,0,0,0.1); }
    .news-item b { color:#2980b9; }
    .container { max-width: 900px; margin: 0 auto; }
  </style>
</head>
<body>
  <div class="container">
    <h1>UPSC News Feed</h1>
    <h2 id="date"></h2>
    <div id="news"></div>
  </div>

  <!-- Load external JS (avoids inline script issues) -->
  <script src="./app.js" defer></script>
</body>
</html>
