name: UPSC AI Daily Update

on:
  schedule:
    - cron: '30 0 * * *'     # 06:00 IST
  workflow_dispatch:

jobs:
  ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install deps
      run: |
        python -m pip install --upgrade pip
        pip install feedparser requests

    - name: Run AI script
      env:
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      run: |
        python fetch_ai_news.py

    - name: Commit updated ai_news.json
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add ai_news.json
        git commit -m "AI UPSC Update $(date)" || echo "No changes"
        git push
