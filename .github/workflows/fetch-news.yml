name: Daily AI UPSC Briefs

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST (00:30 UTC)
  workflow_dispatch:

jobs:
  ai-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    env:
      # >>>> CHANGE THIS LINE ONLY <<<<
      SITE_DIR: docs    # set to '.' if your Pages uses root instead of /docs
      AI_PROVIDER: openai        # openai | azure | hf | none
      OPENAI_MODEL: gpt-4o-mini  # for OpenAI; cheap & good for summaries
      MAX_ITEMS: '20'

    steps:
      - name: Checkout
        uses: actions/checkout@v5   # node22, removes deprecation warning

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install feedparser requests

      - name: Build ai_news.json with AI
        env:
          SITE_DIR: ${{ env.SITE_DIR }}
          AI_PROVIDER: ${{ env.AI_PROVIDER }}
          OPENAI_MODEL: ${{ env.OPENAI_MODEL }}
          MAX_ITEMS: ${{ env.MAX_ITEMS }}
          # Secrets for AI providers (set at Repo → Settings → Secrets → Actions)
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AZURE_OPENAI_ENDPOINT: ${{ secrets.AZURE_OPENAI_ENDPOINT }}
          AZURE_OPENAI_API_KEY: ${{ secrets.AZURE_OPENAI_API_KEY }}
          AZURE_OPENAI_DEPLOYMENT: ${{ secrets.AZURE_OPENAI_DEPLOYMENT }}
          AZURE_OPENAI_API_VERSION: ${{ secrets.AZURE_OPENAI_API_VERSION }}
          HUGGINGFACE_TOKEN: ${{ secrets.HUGGINGFACE_TOKEN }}
        run: |
          python fetch_ai_news.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add $SITE_DIR/ai_news.json
          git diff --quiet && echo "No changes" || git commit -m "AI update: $SITE_DIR/ai_news.json ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
          git push
