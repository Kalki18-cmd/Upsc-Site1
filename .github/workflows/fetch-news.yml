name: Daily: Build news.json (PIB)

on:
  schedule:
    - cron: '30 0 * * *'   # 06:00 IST = 00:30 UTC
  workflow_dispatch:       # allow manual run

jobs:
  build-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to push changes back to the repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install feedparser

      - name: Generate news.json
        run: |
          python fetch_news.py

      - name: Commit & push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add news.json
          git diff --quiet && echo "No changes" || git commit -m "Auto-update news.json $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
          git push
